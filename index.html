<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設備研發部 - 問題解決分析庫</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="pixel-bg">
  <div class="watermark">GENIIDEAS</div>

  <div id="login-overlay">
    <div class="pixel-box login-card">
      <div class="pixel-title">SECURITY_ACCESS</div>
      <p class="pixel-text">問題解決分析庫 - 驗證人員識別碼</p>
      <input type="text" id="login-user" class="pixel-input" placeholder="人員識別碼 (ID)..." style="margin-bottom:15px;">
      <input type="password" id="login-pwd" class="pixel-input security-mask" placeholder="密碼...">
      <button class="pixel-btn btn-primary btn-login-giant" id="login-btn" onclick="handleLogin()">驗證啟動 ➔</button>
      <p id="login-status" style="font-size: 10px; color: #555; margin-top: 15px;">系統初始化中...</p>
    </div>
  </div>

  <div id="main-ui" style="display:none;">
    <header>
        <h1 class="pixel-h1">設備研發部 - 問題解決分析庫</h1>
        <div class="user-display">USER: <span id="current-username-display">UNKNOWN</span></div>
    </header>

    <div class="layout-container">
      <nav class="sidebar pixel-border">
        <button class="nav-btn" id="btn-tab-main" onclick="switchTab('tab-main')" style="display:none;">儀表板<br><small>(Dashboard)</small></button>
        <button class="nav-btn active" id="btn-tab-issues" onclick="switchTab('tab-issues')">問題資料庫<br><small>(Issues)</small></button>
        <button class="nav-btn" id="btn-tab-manager" onclick="switchTab('tab-manager')" style="display:none; color: #ffb7c5;">主管事務管理<br><small>(Manager)</small></button>
        <div style="flex:1"></div>
        <button class="nav-btn logout-btn" onclick="window.location.href=window.location.pathname">登出系統</button>
      </nav>

      <main class="main-content">
        <div id="tab-main" class="tab-section" style="display:none;">
          <div class="dashboard-grid">
            <div class="stats-container pixel-border">
              <div class="stats-header-wrap">
                <h3 class="pixel-label label-light-green">[ 人員任務統計 ]</h3>
                <div class="stats-controls">
                  <input type="date" id="stats-owner-start" class="pixel-input mini-date" onclick="this.showPicker()" onchange="renderStats()">
                  <span style="color:#fff;">~</span>
                  <input type="date" id="stats-owner-end" class="pixel-input mini-date" onclick="this.showPicker()" onchange="renderStats()">
                </div>
              </div>
              <div id="stats-bars"></div>
            </div>
            <div class="stats-container pixel-border">
              <div class="stats-header-wrap">
                <h3 class="pixel-label label-light-green">[ 產品類別統計 ]</h3>
                <div class="stats-controls">
                  <input type="date" id="stats-prod-start" class="pixel-input mini-date" onclick="this.showPicker()" onchange="renderStats()">
                  <span style="color:#fff;">~</span>
                  <input type="date" id="stats-prod-end" class="pixel-input mini-date" onclick="this.showPicker()" onchange="renderStats()">
                </div>
              </div>
              <div id="product-stats-bars"></div>
            </div>
          </div>
        </div>

        <div id="tab-issues" class="tab-section">
          <div class="control-panel pixel-border">
            <input type="text" id="search-input" class="pixel-input mini-search" placeholder="關鍵字搜尋..." oninput="renderIssues()">
            <div class="filter-group">
              <div class="custom-select"><div class="select-selected pixel-input" onclick="toggleDropdown('items-owner', event)">負責人 ▾</div><div class="select-items pixel-border" id="items-owner" style="display:none;"></div></div>
              <div class="custom-select"><div class="select-selected pixel-input" onclick="toggleDropdown('items-status', event)">狀態 ▾</div><div class="select-items pixel-border" id="items-status" style="display:none;"></div></div>
              <div class="custom-select"><div class="select-selected pixel-input" onclick="toggleDropdown('items-product', event)">產品別 ▾</div><div class="select-items pixel-border" id="items-product" style="display:none;"></div></div>
            </div>
            <button class="pixel-btn btn-add" onclick="openModal('TS')">+ 新增</button>
          </div>
          <div class="todo-grid" id="issue-display"></div>
        </div>

        <div id="tab-manager" class="tab-section" style="display:none;">
          <div class="control-panel pixel-border panel-manager">
            <input type="text" id="search-input-mgr" class="pixel-input mini-search mgr-text" placeholder="管理事項搜尋..." oninput="renderManagerIssues()">
            <div class="filter-group">
              <div class="custom-select"><div class="select-selected pixel-input mgr-text" onclick="toggleDropdown('mgr-owner', event)">負責人 ▾</div><div class="select-items pixel-border" id="mgr-owner" style="display:none;"></div></div>
              <div class="custom-select"><div class="select-selected pixel-input mgr-text" onclick="toggleDropdown('mgr-status', event)">狀態 ▾</div><div class="select-items pixel-border" id="mgr-status" style="display:none;"></div></div>
              <div class="custom-select"><div class="select-selected pixel-input mgr-text" onclick="toggleDropdown('mgr-product', event)">產品別 ▾</div><div class="select-items pixel-border" id="mgr-product" style="display:none;"></div></div>
            </div>
            <button class="pixel-btn btn-manager-add-pink" onclick="openModal('MGR')">+ 新增</button>
          </div>
          <div class="todo-grid" id="manager-issue-display"></div>
        </div>
      </main>
    </div>
  </div>

  <div id="modal-overlay" class="modal-overlay">
    <div class="pixel-modal navy-theme" id="modal-container">
      <div class="modal-header-bar"><span id="modal-title">TASK_CONFIGURATION_V7.0</span><span class="pixel-close" onclick="closeModal()">[X]</span></div>
      <form id="issueForm" class="modal-body">
        <input type="hidden" id="edit-id">
        <div class="field-grid-73">
          <div class="field-item"><label class="pixel-label label-light-green">Issue (任務名稱)</label><input type="text" id="input-issue" class="pixel-input wide highlight-font" required></div>
          <div class="field-item"><label class="pixel-label label-light-green">建立日期</label><input type="text" id="input-created-date" class="pixel-input wide" readonly style="opacity:0.6;"></div>
        </div>
        <div class="field-grid-4">
          <div class="field-item"><label class="pixel-label label-light-green">Owner</label><select id="input-owner" class="pixel-input" required></select></div>
          <div class="field-item"><label class="pixel-label label-light-green">Status</label><select id="input-status" class="pixel-input" onchange="handleStatusChange()" required></select></div>
          <div class="field-item"><label class="pixel-label label-light-green">客戶別</label><select id="input-customer" class="pixel-input" required></select></div>
          <div class="field-item"><label class="pixel-label label-light-green">產品別</label><select id="input-product" class="pixel-input" required></select></div>
        </div>
        <div class="field-grid">
          <div class="field-item"><label class="pixel-label label-light-green">專案別</label><select id="input-project" class="pixel-input" required></select></div>
          <div class="field-item"><label class="pixel-label label-light-green">預計完成時間</label><input type="date" id="input-deadline" class="pixel-input date-picker-custom" onclick="this.showPicker()" required></div>
        </div>
        <div class="field-grid-4">
          <div class="field-item" style="grid-column: span 2;"><label class="pixel-label label-light-green">優先級</label><select id="input-priority" class="pixel-input" required><option value="" disabled selected>請選擇...</option><option value="1_高">高</option><option value="2_一般">一般</option><option value="3_低">低</option></select></div>
          <div class="field-item" style="grid-column: span 2;"><label class="pixel-label label-light-green">實際結案日</label><input type="date" id="input-actual-closed" class="pixel-input date-picker-custom" onclick="this.showPicker()" readonly style="opacity:0.5;"></div>
        </div>
        <div class="field-grid">
          <div class="field-item"><label class="pixel-label label-light-green">任務描述</label><textarea id="input-description" class="pixel-input scroll" rows="8" style="height: 250px;" required></textarea></div>
          <div class="field-item">
            <label class="pixel-label label-light-green">事項紀錄 <button type="button" class="mini-plus-btn" onclick="addRecordItem()">[+] 新增</button></label>
            <div id="records-container" class="scroll" style="height: 250px; overflow-y: auto; border: 2px solid #285428; padding: 10px; background: rgba(0,0,0,0.3);"></div>
          </div>
        </div>
        <div class="field-grid-73">
           <div class="field-item"><label class="pixel-label label-light-green">相關檔案連結</label><div id="link-group"><input type="text" class="pixel-input wide link-entry" placeholder="https://..."></div></div>
           <div class="field-item"><label class="pixel-label label-light-green">建立者</label><input type="text" id="input-creator" class="pixel-input wide" readonly style="opacity:0.7;"></div>
        </div>
        <div class="modal-footer" style="display: flex; justify-content: space-between; width: 100%; margin-top: 15px;">
          <button type="button" id="btn-delete" class="pixel-btn btn-delete-8bit" style="display:none;" onclick="deleteIssue()">[ 刪除紀錄 ]</button>
          <div style="display: flex; gap: 15px; margin-left: auto;">
            <button type="button" class="pixel-btn btn-secondary-8bit" onclick="closeModal()">取消</button>
            <button type="button" id="submit-btn" class="pixel-btn btn-primary-8bit" onclick="submitIssue()">建立完成</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
